name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release type
        id: release_type
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          LOWER="${TAG,,}"
          # Treat any of the following as alpha:
          #   - the literal substring "alpha"
          #   - a "-a<N>" suffix (e.g. v0.10.0-a3)
          # Treat any of the following as beta:
          #   - the literal substring "beta"
          #   - a "-b<N>" suffix (e.g. v0.10.0-b1)
          # Anything else is a stable/release.
          if [[ "$LOWER" == *"alpha"* || "$LOWER" =~ -a[0-9]+$ ]]; then
            CHANNEL=alpha
            PRERELEASE=true
            PACKAGER_FLAG=-a
          elif [[ "$LOWER" == *"beta"* || "$LOWER" =~ -b[0-9]+$ ]]; then
            CHANNEL=beta
            PRERELEASE=true
            PACKAGER_FLAG=-b
          else
            CHANNEL=release
            PRERELEASE=false
            PACKAGER_FLAG=
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "packager_flag=$PACKAGER_FLAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "Release channel: $CHANNEL"
          echo "Prerelease: $PRERELEASE"
          echo "Packager flag: $PACKAGER_FLAG"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          skipIfReleaseExists: true
          prerelease: ${{ steps.release_type.outputs.prerelease }}

      - name: Package and Publish
        uses: BigWigsMods/packager@v2
        with:
          # Explicitly pass -a / -b to the packager so it uploads to
          # CurseForge / Wago as alpha / beta. Without this the packager
          # auto-detects from the tag name and only recognizes literal
          # "-alpha" / "-beta" substrings, so "-a3" style tags would be
          # uploaded as stable releases by mistake (which is exactly how
          # v0.10.0-a1, -a2, and -a3 ended up public as full releases).
          args: -g retail ${{ steps.release_type.outputs.packager_flag }}
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
